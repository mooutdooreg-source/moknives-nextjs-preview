<!doctype html>
<html lang="en" class="scroll-smooth">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description"
    content="Contact Mo Knives. Start the conversation to commission a custom blade, discuss a collaboration, or make an inquiry.">
  <title>Mo Knives | Contact</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;800&family=Inter:wght@300;400;600&display=swap"
    rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="assets/js/tailwind-config.js"></script>
  <script src="https://unpkg.com/lucide@latest" defer></script>
  <link rel="stylesheet" href="assets/css/layout.css">
  <link rel="stylesheet" href="assets/css/asset-fallbacks.css">
  <link rel="stylesheet" href="assets/css/media-wrappers.css">
  <link rel="stylesheet" href="assets/css/pages/contact.css">
  <link rel="stylesheet" href="assets/css/card-actions.css">
  <script src="assets/js/layout.js" defer></script>
  <script src="assets/js/media-resolver.js" defer></script>
</head>

<body class="font-sans antialiased selection:bg-forge-accent selection:text-white w-full" data-page="contact">

    <div id="site-header"></div>

  <main class="overflow-x-hidden">
    <!-- CONTACT -->
    <section class="py-24 bg-[url('images/contact-mobile-menu-background-1.avif')] bg-cover bg-center bg-no-repeat relative overflow-hidden">
      <div
        class="absolute inset-0 bg-gradient-to-b md:bg-gradient-to-r from-forge-950/95 md:from-forge-950 via-forge-950/80 md:via-forge-950/50 to-forge-950/30 md:to-transparent">
      </div>
      <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 relative z-10">
        <div class="max-w-2xl fade-up">
          <span class="text-forge-accent tracking-[0.4em] text-xs uppercase font-bold"><span
              class="hover-glow">CONTACT</span></span>
          <h1 class="font-serif text-3xl sm:text-4xl md:text-5xl uppercase tracking-widest mt-3 font-bold">
            <span class="block text-white"><span class="hover-glow-white">START THE</span></span>
            <span class="block text-yellow-500"><span class="hover-glow">CONVERSATION.</span></span>
          </h1>

          <!-- Gate -->
          <div id="contact-gate" class="fade-up">
            <h3 class="mt-12 uppercase text-sm tracking-widest mb-8">LET ME KNOW WHO YOU ARE</h3>
            <div class="space-y-10 text-left max-w-lg">
              <div>
                <p
                  class="text-sm sm:text-base font-serif uppercase tracking-widest text-forge-accent font-bold mb-5 drop-shadow-md">
                  1. What brings you here?</p>
                <div class="flex flex-wrap gap-3">
                  <button onclick="this.classList.toggle('bg-forge-accent'); this.classList.toggle('text-white')"
                    class="text-xs px-6 py-3 border border-forge-700 hover:border-forge-accent rounded-sm">To commission
                    a blade</button>
                  <button onclick="this.classList.toggle('bg-forge-accent'); this.classList.toggle('text-white')"
                    class="text-xs px-6 py-3 border border-forge-700 hover:border-forge-accent rounded-sm">To ask about
                    a specific piece</button>
                  <button onclick="this.classList.toggle('bg-forge-accent'); this.classList.toggle('text-white')"
                    class="text-xs px-6 py-3 border border-forge-700 hover:border-forge-accent rounded-sm">To discuss a
                    collaboration</button>
                  <button onclick="this.classList.toggle('bg-forge-accent'); this.classList.toggle('text-white')"
                    class="text-xs px-6 py-3 border border-forge-700 hover:border-forge-accent rounded-sm">To reach out
                    directly</button>
                </div>
              </div>
              <div>
                <p
                  class="text-sm sm:text-base font-serif uppercase tracking-widest text-forge-accent font-bold mb-5 drop-shadow-md">
                  2. Which world speaks to you most?</p>
                <div class="flex flex-wrap gap-3">
                  <button onclick="this.classList.toggle('bg-forge-accent'); this.classList.toggle('text-white')"
                    class="text-xs px-6 py-3 border border-forge-700 hover:border-forge-accent rounded-sm">Expedition</button>
                  <button onclick="this.classList.toggle('bg-forge-accent'); this.classList.toggle('text-white')"
                    class="text-xs px-6 py-3 border border-forge-700 hover:border-forge-accent rounded-sm">Culinary</button>
                  <button onclick="this.classList.toggle('bg-forge-accent'); this.classList.toggle('text-white')"
                    class="text-xs px-6 py-3 border border-forge-700 hover:border-forge-accent rounded-sm">Vanguard</button>
                  <button onclick="this.classList.toggle('bg-forge-accent'); this.classList.toggle('text-white')"
                    class="text-xs px-6 py-3 border border-forge-700 hover:border-forge-accent rounded-sm">Singularis</button>
                  <button onclick="this.classList.toggle('bg-forge-accent'); this.classList.toggle('text-white')"
                    class="text-xs px-6 py-3 border border-forge-700 hover:border-forge-accent rounded-sm">Iâ€™m not sure
                    yet</button>
                </div>
              </div>
              <div>
                <p
                  class="text-sm sm:text-base font-serif uppercase tracking-widest text-forge-accent font-bold mb-5 drop-shadow-md">
                  3. What matters most to you?</p>
                <div class="flex flex-wrap gap-3">
                  <button onclick="this.classList.toggle('bg-forge-accent'); this.classList.toggle('text-white')"
                    class="text-xs px-6 py-3 border border-forge-700 hover:border-forge-accent rounded-sm">Performance</button>
                  <button onclick="this.classList.toggle('bg-forge-accent'); this.classList.toggle('text-white')"
                    class="text-xs px-6 py-3 border border-forge-700 hover:border-forge-accent rounded-sm">Precision</button>
                  <button onclick="this.classList.toggle('bg-forge-accent'); this.classList.toggle('text-white')"
                    class="text-xs px-6 py-3 border border-forge-700 hover:border-forge-accent rounded-sm">Trust</button>
                  <button onclick="this.classList.toggle('bg-forge-accent'); this.classList.toggle('text-white')"
                    class="text-xs px-6 py-3 border border-forge-700 hover:border-forge-accent rounded-sm">Rarity</button>
                  <button onclick="this.classList.toggle('bg-forge-accent'); this.classList.toggle('text-white')"
                    class="text-xs px-6 py-3 border border-forge-700 hover:border-forge-accent rounded-sm">Guidance</button>
                </div>
              </div>
              <div>
                <p
                  class="text-sm sm:text-base font-serif uppercase tracking-widest text-forge-accent font-bold mb-5 drop-shadow-md">
                  4. How would you like this conversation to begin?
                </p>
                <div class="flex flex-wrap gap-3">
                  <button onclick="this.classList.toggle('bg-forge-accent'); this.classList.toggle('text-white')"
                    class="text-xs px-6 py-3 border border-forge-700 hover:border-forge-accent rounded-sm">WhatsApp</button>
                  <button onclick="this.classList.toggle('bg-forge-accent'); this.classList.toggle('text-white')"
                    class="text-xs px-6 py-3 border border-forge-700 hover:border-forge-accent rounded-sm">Email</button>
                  <button onclick="this.classList.toggle('bg-forge-accent'); this.classList.toggle('text-white')"
                    class="text-xs px-6 py-3 border border-forge-700 hover:border-forge-accent rounded-sm">Message
                    form</button>
                </div>
              </div>

              <button onclick="revealContactOptions()"
                class="w-full py-5 bg-white text-forge-900 uppercase tracking-[0.3em] text-xs font-bold">CONTINUE</button>
            </div>
          </div>

          <!-- Contact Options -->
          <div id="contact-options" class="hidden mt-12">
            <div class="grid grid-cols-1 sm:grid-cols-3 gap-4 max-w-md w-full">
              <div onclick="showMessageForm()"
                class="cursor-pointer p-5 sm:p-8 bg-forge-800 hover:bg-forge-700 text-center rounded-sm">Email</div>
              <div onclick="window.open('https://wa.me/','_blank')"
                class="cursor-pointer p-5 sm:p-8 bg-forge-800 hover:bg-forge-700 text-center rounded-sm">WhatsApp</div>
              <div onclick="showMessageForm()"
                class="cursor-pointer p-5 sm:p-8 bg-forge-800 hover:bg-forge-700 text-center rounded-sm">Message Form
              </div>
            </div>

            <!-- Message Form -->
            <div id="message-form" class="hidden mt-12 max-w-2xl bg-forge-900 p-10 rounded-sm">
              <h3 class="text-xl uppercase tracking-widest mb-8">Send a Message</h3>
              <form class="space-y-6" onsubmit="submitSuccess(event)">
                <input type="text" placeholder="Full Name" aria-label="Full Name" class="form-input w-full px-5 py-4 text-sm" required>
                <input type="email" placeholder="Email" aria-label="Email" class="form-input w-full px-5 py-4 text-sm" required>
                <input type="tel" placeholder="WhatsApp / Phone" aria-label="WhatsApp or Phone" class="form-input w-full px-5 py-4 text-sm">
                <select class="form-input w-full px-5 py-4 text-sm" aria-label="Inquiry Type">
                  <option>Preferred contact method</option>
                  <option>WhatsApp</option>
                  <option>Email</option>
                </select>
                <input id="contact-subject" type="text" placeholder="Subject" aria-label="Subject" class="form-input w-full px-5 py-4 text-sm" required>
                <textarea id="contact-message" placeholder="Message" aria-label="Message" rows="6" class="form-input w-full px-5 py-4 text-sm"
                  required></textarea>
                <button type="submit"
                  class="w-full py-5 bg-forge-accent text-white uppercase tracking-[0.3em] text-xs font-bold">SEND
                  MESSAGE</button>
              </form>
            </div>
          </div>
        </div>
      </div>
    </section>
  </main>

  <!-- FOOTER -->
    <div id="site-footer"></div>

  <script>
    if (window.lucide && typeof window.lucide.createIcons === 'function') { lucide.createIcons(); }

    function revealContactOptions() {
      document.getElementById('contact-gate').classList.add('hidden');
      document.getElementById('contact-options').classList.remove('hidden');
    }

    function showMessageForm() {
      document.getElementById('message-form').classList.toggle('hidden');
    }

    function submitSuccess(e) {
      if (e) e.preventDefault();
      const msg = document.createElement('div');
      msg.style.cssText = 'position:fixed;bottom:16px;right:16px;width:min(420px, calc(100vw - 32px));background:#d97706;color:#111;padding:18px 20px;border-radius:4px;font-size:13px;letter-spacing:0.5px;box-shadow:0 10px 15px -3px rgb(0 0 0 / 0.3);z-index:9999;line-height:1.6;';
      msg.textContent = 'Message received. Youâ€™ve taken the first step toward the right blade.';
      document.body.appendChild(msg);
      setTimeout(() => msg.remove(), 4500);
    }

    // Mobile menu

    // Fade Up on Scroll Observer with Dynamic Stagger
    const fadeObserver = new IntersectionObserver((entries) => {
      let delay = 0;
      entries.forEach(entry => {
        if (entry.isIntersecting) {
          setTimeout(() => {
            entry.target.classList.add('is-visible');
          }, delay);
          delay += 100;
          fadeObserver.unobserve(entry.target);
        }
      });
    }, { threshold: 0.1, rootMargin: '0px 0px -50px 0px' });
    document.querySelectorAll('.fade-up').forEach(el => fadeObserver.observe(el));

    function applyIntentFromQuery() {
      const params = new URLSearchParams(window.location.search);
      const subject = params.get('subject');
      const message = params.get('message');
      const autostart = params.get('autostart') === '1';
      const subjectInput = document.getElementById('contact-subject');
      const messageInput = document.getElementById('contact-message');
      if (subject && subjectInput) subjectInput.value = subject;
      if (message && messageInput) messageInput.value = message;
      if (subject || message || autostart) {
        document.getElementById('contact-gate').classList.add('hidden');
        document.getElementById('contact-options').classList.remove('hidden');
        document.getElementById('message-form').classList.remove('hidden');
        requestAnimationFrame(() => {
          document.getElementById('message-form').scrollIntoView({ behavior: 'smooth', block: 'start' });
        });
      }
    }

    applyIntentFromQuery();

  </script>
  <script src="assets/js/card-actions.js"></script>
  <script src="assets/js/photo-card-metadata.js"></script>
</body>

</html>
