<svg xmlns="http://www.w3.org/2000/svg" width="500" height="150" viewBox="0 0 500 150" fill="none">
  <defs>
    <linearGradient id="moCopper" x1="0" y1="0" x2="0" y2="150" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#FFE0B8"/>
      <stop offset="0.18" stop-color="#B35B2E"/>
      <stop offset="0.36" stop-color="#FFD29C"/>
      <stop offset="0.55" stop-color="#5B2618"/>
      <stop offset="0.76" stop-color="#D57A3F"/>
      <stop offset="1" stop-color="#2B100B"/>
    </linearGradient>
    <linearGradient id="moHighlight" x1="0" y1="0" x2="500" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#FFF1D6"/>
      <stop offset="0.3" stop-color="#C06A37"/>
      <stop offset="0.6" stop-color="#F7BE81"/>
      <stop offset="1" stop-color="#35130D"/>
    </linearGradient>
    <filter id="softShadow" x="-20%" y="-30%" width="140%" height="160%" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="3" stdDeviation="2.2" flood-color="#000000" flood-opacity="0.9"/>
      <feDropShadow dx="0" dy="0" stdDeviation="1.2" flood-color="#E27A3F" flood-opacity="0.38"/>
    </filter>
  </defs>

  <rect width="500" height="150" fill="transparent"/>

  <g filter="url(#softShadow)">
    <text x="44" y="96" font-family="Georgia, 'Times New Roman', serif" font-size="82" font-weight="700" letter-spacing="-18" fill="url(#moCopper)" stroke="#1A0906" stroke-width="2.2">MG</text>
    <path d="M91 28C80 48 76 75 84 119" stroke="url(#moHighlight)" stroke-width="3" stroke-linecap="round"/>
    <path d="M123 26C108 51 105 78 112 120" stroke="url(#moHighlight)" stroke-width="3" stroke-linecap="round"/>
    <path d="M176 24V126" stroke="url(#moHighlight)" stroke-width="2.4" opacity="0.95"/>
    <text x="208" y="98" font-family="Georgia, 'Times New Roman', Cinzel, serif" font-size="70" font-weight="700" letter-spacing="2" fill="url(#moCopper)" stroke="#170806" stroke-width="2.4">KNIVES</text>
    <path d="M211 52H454" stroke="#FFE4BD" stroke-width="1" opacity="0.38"/>
    <path d="M210 103H456" stroke="#2B100B" stroke-width="1" opacity="0.52"/>
